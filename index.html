<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *;">
    <title>Cooker AI</title>
    <style>
        :root { --p-green: #E8F5E9; --d-green: #4CAF50; }
        body { font-family: sans-serif; background: var(--p-green); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #status { margin: 15px 0; font-size: 0.9rem; color: #1976D2; font-weight: bold; }
        #result { margin-top: 15px; text-align: left; background: #f4f4f4; padding: 15px; border-radius: 10px; white-space: pre-wrap; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cooker AI</h1>
        <input type="text" id="urlInput" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;" placeholder="유튜브 링크 입력">
        <div id="status">AI 엔진 준비 중...</div>
        <button id="btn" disabled style="width:100%; padding:12px; background:var(--d-green); color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">대기 중</button>
        <div id="result">레시피 결과가 여기에 표시됩니다.</div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
